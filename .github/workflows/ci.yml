# Validação no GitHub (sem Vercel): build + testes em push/PR.
# O deploy do app em si costuma ser no painel do host (Railway, Render, Fly, etc.)
# conectado ao repositório, ou num workflow separado com SSH/Docker — conforme sua infra.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
